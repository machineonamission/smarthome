# IN PRO MODE

# aux mic = alsa_input.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.pro-input-0
# webcam mic = alsa_input.usb-046d_C270_HD_WEBCAM_BE4980A0-02.pro-input-0
# speakers AND headphones = alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.pro-output-31
# speakers AND headphones alt? = alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.pro-output-31


# mic pipeline:
# mic
# -> capture.echo_cancel ---(echo cancel)---> source.echo_cancel
# -> capture.rnnoise_source ---(rnnoise---> playback.rnnoise_source ->
# app

# speaker pipeline:
# app ->
# dynaudnorm.capture ---(dynaudnorm)---> dynaudnorm.playback ->
# (music will play here to skip dynaudnorm step ->)
# sink.echo_cancel ---(echo cancel)---> playback.echo_cancel ->
# speakers

# set sink.echo_cancel and rnnoise_source as system defaults
context.modules = [
  {
    name = libpipewire-module-echo-cancel
    args = {
      monitor.mode = false
      library.name = aec/libspa-aec-webrtc
      aec.args = {
        webrtc.extended_filter = true
        webrtc.delay_agnostic = true
        webrtc.high_pass_filter = true
        webrtc.voice_detection = false
        webrtc.experimental_ns = false
        webrtc.gain_control = true
        webrtc.experimental_agc = true
        webrtc.noise_suppression = false
      }
      # raw mic input goes into here
      capture.props = {
        node.name = "capture.echo_cancel"
        target.object = "alsa_input.usb-046d_C270_HD_WEBCAM_BE4980A0-02.pro-input-0"
        audio.rate = 48000
        audio.format = "S16LE"
        audio.channels = 1

        resample.quality = 14
      }
      # is echo cancelled and exposed as source
      source.props = {
        node.name = "source.echo_cancel"
        node.description = "Echo Cancelled Mic"
        audio.rate = 48000
        audio.channels = 1

        resample.quality = 14
      }

      # app tries to play through here, module gets speaker info to cancel
      sink.props = {
        node.name = "sink.echo_cancel"
        audio.rate = 48000
        audio.position = [FL FR]

        audio.channels = 2
      }
      # repeat of sink
      playback.props = {
        node.name = "playback.echo_cancel"
        target.object = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.pro-output-0"
        audio.rate = 48000
        audio.format = "S32LE"
        audio.position = [FL FR]

        audio.channels = 2
      }
    }
  }
